name: Build anti_dev_pm_zygisk

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set -eux
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Fix line endings
        shell: bash
        run: |
          # CRLF in source files causes ndk-build's Make to choke on .d files
          find jni -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.mk' \) -exec sed -i 's/\r$//' {} +

      - name: Build native libraries
        shell: bash
        run: |
          set -eux
          rm -rf obj libs module/zygisk
          "$ANDROID_NDK_HOME/ndk-build" -C jni

      - name: Package Magisk module
        shell: bash
        run: |
          set -eux
          # Copy built .so files to module/zygisk/
          mkdir -p module/zygisk
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            cp "libs/$abi/libanti_dev_pm_zygisk.so" "module/zygisk/$abi.so"
          done
          # Read version from module.prop
          version=$(grep '^version=' module/module.prop | head -1 | cut -d= -f2)
          zip_name="anti_dev_pm_zygisk-${version}.zip"
          # Create zip from module/ contents
          cd module && zip -r "../$zip_name" . -x "*.DS_Store" "*/\.*" && cd ..
          ls -lh "$zip_name"

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: anti_dev_pm_zygisk
          path: anti_dev_pm_zygisk-*.zip
